name: 🎂 Birthday Email Notifications

on:
  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log emails but do not send)'
        required: false
        default: 'false'
      test_mode:
        description: 'Test mode (send a sample email to verify setup)'
        required: false
        default: 'false'
      test_recipient:
        description: 'Email address to receive the test (leave blank for all active)'
        required: false
        default: ''

jobs:
  check-birthdays:
    name: Check & Send Birthday Emails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout private data repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DATA_REPO }}
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: _data

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install nodemailer

      - name: Run birthday checker
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          BIRTHDAYS_PATH: _data/birthdays.json
          EMAILS_PATH: _data/emails.json
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          TEST_RECIPIENT: ${{ github.event.inputs.test_recipient || '' }}
        run: node .github/scripts/birthday-mailer.js
